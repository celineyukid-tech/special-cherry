<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智慧田字格 · 看拼音写汉字</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #f7f3e9;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'Helvetica Neue', Roboto, sans-serif;
            margin: 0;
            padding: 20px 16px 40px;
            color: #2d3e2b;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #fffef7;
            border-radius: 48px 32px 48px 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1.6rem;
            color: #c47b2e;
            border-left: 6px solid #e9b35f;
            padding-left: 16px;
            margin-top: 0;
        }

        textarea {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.1rem;
            border: 2px solid #e2dccd;
            border-radius: 32px;
            background: #fefcf5;
            resize: vertical;
            font-family: monospace;
        }

        textarea:focus {
            border-color: #e9b35f;
            outline: none;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 12px;
        }

        .btn {
            background: #e9b35f;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 60px;
            color: #2d3e2b;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-secondary {
            background: #d9d0b5;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #e9b35f;
            color: #c47b2e;
        }

        .btn-primary {
            background: #c47b2e;
            color: white;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .practice-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 200px));
            gap: 1.5rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .tian-cell {
            background: #fffdf7;
            border-radius: 28px;
            padding: 1rem 0.5rem;
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .pinyin-area {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            background: #f3efdf;
            padding: 10px 8px;
            border-radius: 48px;
            margin-bottom: 16px;
            width: 90%;
            color: #b45f2b;
        }

        .canvas-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto;
            background: #fef7e0;
            border-radius: 20px;
            cursor: crosshair;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 16px;
            background: #fffef5;
            box-shadow: inset 0 0 0 2px #e7dbbc;
            touch-action: none;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .review-toolbar {
            background: #faf3e0;
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
            align-items: center;
        }

        .result-area {
            margin-top: 20px;
            background: #e9e0cc;
            border-radius: 36px;
            padding: 16px 20px;
        }

        .score-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #c0681e;
        }

        .mark-icon {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 2px white;
            pointer-events: none;
            z-index: 10;
        }

        @media (max-width: 550px) {
            .practice-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            .canvas-wrapper {
                width: 130px;
                height: 130px;
            }
            .pinyin-area {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>📝 输入词语（用换行或顿号分隔）</h2>
        <div class="word-input-area">
            <textarea id="wordInput" rows="3" placeholder="示例：&#10;苹果&#10;香蕉&#10;熊猫&#10;快乐">苹果
香蕉
熊猫
快乐</textarea>
            <div class="button-group">
                <button id="generateBtn" class="btn">✨ 生成练习</button>
                <button id="sampleBtn" class="btn btn-secondary">📋 加载示例</button>
                <button id="clearAllMarksBtn" class="btn btn-outline btn-sm">🗑️ 清除所有批改标记</button>
            </div>
            <div class="badge" style="align-self: flex-start; font-size:0.8rem; color:#7a5a3a;">💡 词语会拆成单字练习，每个字独立田字格，上方显示拼音</div>
        </div>
    </div>

    <div id="practicePanel" style="display: none;">
        <div class="card">
            <h2>✍️ 看拼音写汉字 · 单字练习</h2>
            <div id="reviewToolbar" class="review-toolbar">
                <button id="batchCorrectBtn" class="btn btn-primary">⭐ 智能批改全部</button>
                <button id="resetAllHandwritingBtn" class="btn btn-outline">🖌️ 清空所有笔迹</button>
                <span id="progressTip" class="badge" style="background:#ece3d0; padding:6px 14px;">0 / 0 已批改</span>
            </div>
            <div id="tianGridContainer" class="practice-grid"></div>
            <div id="correctionResultArea" class="result-area" style="display: none;">
                <strong>📊 批改报告</strong>
                <div id="correctionDetail"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== 汉字转拼音（单字库 + 兜底） ====================
    const charPinyinMap = {
        "苹":"píng","果":"guǒ","香":"xiāng","蕉":"jiāo","熊":"xióng","猫":"māo","快":"kuài","乐":"lè",
        "学":"xué","习":"xí","编":"biān","程":"chéng","田":"tián","字":"zì","格":"gé","写":"xiě",
        "中":"zhōng","国":"guó","春":"chūn","天":"tiān","花":"huā","朵":"duǒ","太":"tài","阳":"yáng",
        "月":"yuè","亮":"liàng","星":"xīng","老":"lǎo","师":"shī","生":"shēng","爱":"ài","好":"hǎo",
        "大":"dà","小":"xiǎo","云":"yún","风":"fēng","雨":"yǔ","雪":"xuě","山":"shān","水":"shuǐ",
        "日":"rì","月":"yuè","火":"huǒ","木":"mù","土":"tǔ","金":"jīn","口":"kǒu","耳":"ěr"
    };

    function getSinglePinyin(ch) {
        if (charPinyinMap[ch]) return charPinyinMap[ch];
        // 兜底：简单转换带声调的拼音基本没有，但至少返回字母占位
        return ch;
    }

    // 将词语列表拆分成单字练习项
    function expandWordsToChars(wordsArray) {
        let items = [];
        for (let word of wordsArray) {
            for (let ch of word) {
                if (ch.trim() && !/[，,、。？!；：\s]/.test(ch)) {  // 过滤标点空格
                    items.push({
                        id: items.length,
                        char: ch,
                        pinyin: getSinglePinyin(ch)
                    });
                }
            }
        }
        return items;
    }

    // 解析输入框内容
    function parseInputToWords(raw) {
        let lines = raw.split(/\r?\n/);
        let words = [];
        for (let line of lines) {
            if (line.includes('、') || line.includes('，') || line.includes(',')) {
                let splits = line.split(/[、，,]+/);
                for (let s of splits) {
                    let cleaned = s.trim();
                    if (cleaned) words.push(cleaned);
                }
            } else {
                let cleaned = line.trim();
                if (cleaned) words.push(cleaned);
            }
        }
        return words;
    }

    // ==================== 田字格画板类 ====================
    class TianCanvas {
        constructor(canvasElement, standardChar, charId) {
            this.canvas = canvasElement;
            this.ctx = canvasElement.getContext('2d');
            this.standardChar = standardChar;
            this.id = charId;
            this.isDrawing = false;
            this.lastX = 0;
            this.lastY = 0;
            this.correctStatus = null;
            this.setupCanvasSize();
            this.drawGrid();
            this.initEvents();
        }

        setupCanvasSize() {
            const rect = this.canvas.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            if (this.canvas.width !== w || this.canvas.height !== h) {
                this.canvas.width = w;
                this.canvas.height = h;
                this.drawGrid();
            }
        }

        drawGrid() {
            const w = this.canvas.width, h = this.canvas.height;
            this.ctx.save();
            this.ctx.strokeStyle = "#d4c9aa";
            this.ctx.lineWidth = 1.5;
            this.ctx.strokeRect(2, 2, w-4, h-4);
            this.ctx.beginPath();
            this.ctx.moveTo(w/2, 2);
            this.ctx.lineTo(w/2, h-2);
            this.ctx.moveTo(2, h/2);
            this.ctx.lineTo(w-2, h/2);
            this.ctx.stroke();
            this.ctx.beginPath();
            this.ctx.moveTo(4,4);
            this.ctx.lineTo(w-4, h-4);
            this.ctx.moveTo(w-4,4);
            this.ctx.lineTo(4, h-4);
            this.ctx.strokeStyle = "#e8dcb0";
            this.ctx.stroke();
            this.ctx.restore();
        }

        initEvents() {
            const getPos = (e) => {
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                let x = (clientX - rect.left) * scaleX;
                let y = (clientY - rect.top) * scaleY;
                x = Math.min(Math.max(0, x), this.canvas.width);
                y = Math.min(Math.max(0, y), this.canvas.height);
                return { x, y };
            };
            const startDraw = (e) => {
                e.preventDefault();
                this.isDrawing = true;
                const { x, y } = getPos(e);
                this.lastX = x;
                this.lastY = y;
                this.ctx.beginPath();
                this.ctx.moveTo(x, y);
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.ctx.lineWidth = 4;
                this.ctx.strokeStyle = '#3c2a1f';
                this.ctx.globalCompositeOperation = 'source-over';
            };
            const draw = (e) => {
                if (!this.isDrawing) return;
                e.preventDefault();
                const { x, y } = getPos(e);
                this.ctx.lineTo(x, y);
                this.ctx.stroke();
                this.ctx.beginPath();
                this.ctx.moveTo(x, y);
                this.lastX = x;
                this.lastY = y;
            };
            const endDraw = () => {
                this.isDrawing = false;
            };
            this.canvas.addEventListener('mousedown', startDraw);
            this.canvas.addEventListener('mousemove', draw);
            this.canvas.addEventListener('mouseup', endDraw);
            this.canvas.addEventListener('touchstart', startDraw, {passive: false});
            this.canvas.addEventListener('touchmove', draw, {passive: false});
            this.canvas.addEventListener('touchend', endDraw);
        }

        clear() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            this.drawGrid();
            this.correctStatus = null;
            this.removeMark();
        }

        removeMark() {
            const parent = this.canvas.parentNode;
            const existing = parent.querySelector('.mark-icon');
            if(existing) existing.remove();
        }

        markResult(isCorrect) {
            this.correctStatus = isCorrect;
            this.removeMark();
            const markSpan = document.createElement('div');
            markSpan.className = 'mark-icon';
            markSpan.innerText = isCorrect ? '✓' : '✗';
            markSpan.style.color = isCorrect ? '#2b7a3e' : '#c23b22';
            this.canvas.parentNode.style.position = 'relative';
            this.canvas.parentNode.appendChild(markSpan);
        }

        async evaluate() {
            // 检测笔画像素数量
            const userData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
            let pixelCount = 0;
            for (let i = 0; i < userData.data.length; i += 4) {
                if (userData.data[i] < 200) pixelCount++;
            }
            // 笔画太少直接判错（防止瞎写）
            if (pixelCount < 40) {
                return { score: 0, correct: false, reason: "笔画太少" };
            }

            // 离屏canvas渲染标准字
            const offCanvas = document.createElement('canvas');
            offCanvas.width = this.canvas.width;
            offCanvas.height = this.canvas.height;
            const offCtx = offCanvas.getContext('2d');
            offCtx.fillStyle = '#fffef5';
            offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
            const fontSize = offCanvas.width * 0.68;
            offCtx.font = `bold ${fontSize}px "Noto Sans CJK SC", "KaiTi", "楷体", cursive`;
            offCtx.textAlign = 'center';
            offCtx.textBaseline = 'middle';
            offCtx.fillStyle = '#000000';
            offCtx.fillText(this.standardChar, offCanvas.width/2, offCanvas.height/2);
            
            const stdData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
            let overlap = 0, userTotal = 0, stdTotal = 0;
            for (let i = 0; i < userData.data.length; i += 4) {
                const userDark = userData.data[i] < 200;
                const stdDark = stdData.data[i] < 200;
                if (userDark) userTotal++;
                if (stdDark) stdTotal++;
                if (userDark && stdDark) overlap++;
            }
            if (userTotal === 0) return { score: 0, correct: false };
            const userCover = overlap / userTotal;
            const stdCover = stdTotal ? overlap / stdTotal : 0;
            let finalScore = userCover * 0.6 + stdCover * 0.4;
            const isCorrect = finalScore > 0.52 && pixelCount > 50;
            return { score: finalScore, correct: isCorrect };
        }
    }

    let currentItems = [];
    let tianInstances = [];

    function renderPractice(items) {
        const container = document.getElementById('tianGridContainer');
        container.innerHTML = '';
        tianInstances = [];
        if (!items.length) return;

        for (let item of items) {
            const cell = document.createElement('div');
            cell.className = 'tian-cell';
            
            // 拼音区域（显示拼音，不是汉字！）
            const pinyinDiv = document.createElement('div');
            pinyinDiv.className = 'pinyin-area';
            pinyinDiv.innerText = item.pinyin;   // ✅ 关键修复：显示拼音
            
            const canvasWrapper = document.createElement('div');
            canvasWrapper.className = 'canvas-wrapper';
            const canvas = document.createElement('canvas');
            canvas.width = 300;
            canvas.height = 300;
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvasWrapper.appendChild(canvas);
            
            const btnGroup = document.createElement('div');
            btnGroup.className = 'action-buttons';
            const clearBtn = document.createElement('button');
            clearBtn.innerText = '清除重写';
            clearBtn.className = 'btn btn-outline btn-sm';
            const correctSingleBtn = document.createElement('button');
            correctSingleBtn.innerText = '批改本格';
            correctSingleBtn.className = 'btn btn-secondary btn-sm';
            btnGroup.appendChild(clearBtn);
            btnGroup.appendChild(correctSingleBtn);
            
            cell.appendChild(pinyinDiv);
            cell.appendChild(canvasWrapper);
            cell.appendChild(btnGroup);
            container.appendChild(cell);
            
            const tian = new TianCanvas(canvas, item.char, item.id);
            tianInstances.push(tian);
            
            clearBtn.onclick = () => { 
                tian.clear(); 
                updateOverallProgress();
            };
            correctSingleBtn.onclick = async () => {
                const res = await tian.evaluate();
                tian.markResult(res.correct);
                updateOverallProgress();
            };
        }
        document.getElementById('practicePanel').style.display = 'block';
        document.getElementById('correctionResultArea').style.display = 'none';
        updateOverallProgress();
    }

    async function batchCorrect() {
        let correctCount = 0;
        for (let i = 0; i < tianInstances.length; i++) {
            const tian = tianInstances[i];
            const res = await tian.evaluate();
            tian.markResult(res.correct);
            if (res.correct) correctCount++;
        }
        const total = tianInstances.length;
        const detailDiv = document.getElementById('correctionDetail');
        detailDiv.innerHTML = `<div class="score-text">✅ 批改完成！正确 ${correctCount} / ${total}</div>
                               <div>✓ 绿色对号表示AI匹配通过，红色叉号需再练习。</div>`;
        document.getElementById('correctionResultArea').style.display = 'block';
        updateOverallProgress();
    }

    function resetAllHandwriting() {
        for (let t of tianInstances) t.clear();
        document.getElementById('correctionResultArea').style.display = 'none';
        updateOverallProgress();
    }

    function clearAllMarks() {
        for (let t of tianInstances) {
            t.removeMark();
            t.correctStatus = null;
        }
        updateOverallProgress();
    }

    function updateOverallProgress() {
        let reviewed = tianInstances.filter(t => t.correctStatus !== null).length;
        const tip = document.getElementById('progressTip');
        if (tip) tip.innerText = `${reviewed} / ${tianInstances.length} 已批改`;
    }

    function generateFromInput() {
        const raw = document.getElementById('wordInput').value;
        const words = parseInputToWords(raw);
        if (words.length === 0) {
            alert("请输入至少一个词语");
            return;
        }
        currentItems = expandWordsToChars(words);
        renderPractice(currentItems);
    }

    function loadSample() {
        document.getElementById('wordInput').value = "苹果\n香蕉\n熊猫\n快乐\n学习\n中国";
        generateFromInput();
    }

    window.onload = () => {
        document.getElementById('generateBtn').addEventListener('click', generateFromInput);
        document.getElementById('sampleBtn').addEventListener('click', loadSample);
        document.getElementById('batchCorrectBtn').addEventListener('click', batchCorrect);
        document.getElementById('resetAllHandwritingBtn').addEventListener('click', resetAllHandwriting);
        document.getElementById('clearAllMarksBtn').addEventListener('click', clearAllMarks);
        generateFromInput();
    };
</script>
</body>
</html>
